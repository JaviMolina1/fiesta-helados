<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fiesta Helados</title>
        {% load static %}
        <link rel="icon" type="image/jpg" href="{% static 'img/LOGO REDONDO PNG.png' %}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{% static 'css/MisEstilos.css' %}">
    </head>
<body>
    <main class="container" style="margin-top: 150px; color: #426e9b;">
        <h2 class="form__tittle">MODIFICACION DEL PERFIL</h2>
        <div class="row"
            style="background: white; margin: auto; width: 700px; padding: 4.5em 3em; 
                   border-radius: 10px; box-shadow: 0 5px 10px -5px rgb(0 0 0 / 100%); border: solid;">
            <form action="#" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form__group">
                    {{ modificarperfil.first_name.label}}
                    {{ modificarperfil.first_name}}
                </div><br>

                <div class="form__group">
                    {{ modificarperfil.last_name.label}}
                    {{ modificarperfil.last_name}}
                </div><br>

                <div class="form__group">
                    {{ modificarperfil.email.label}}
                    {{ modificarperfil.email}}
                </div><br>

                <div class="form__group" style="text-align: center;">
                    <a href="{% url 'perfil'  %}" class="btn btn-outline-dark">Perfil de Usuario</a>
                    <input type="submit" value="Modificar" class="btn btn-outline-danger">
                </div>
            </form>
        </div>
    </main>
</body>
</html>
