<!DOCTYPE html>

<head>

    {% load static %}
    <link rel="icon" type="image/jpg" href="{% static 'img/LOGO REDONDO PNG.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/MisEstilos.css' %}">
    <style>
        .form-control{
            margin-bottom: 10px;
        }
        label{
            color:darkmagenta;
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
            clear:both;
            float:left;
        }

        .error-label{
            border:1px solid red;
        }

        label.error{
            color:red;
            font-size:0.8em;
            margin-top:-5px;
        }

        .fcc-btn {
            background-color: #d2ba6b;
            color: rgb(189, 23, 223);
        }


    </style>

</head>
<body>

  <nav class="navbar navbar-expand-sm bg-light, menu">
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#opciones"
        style="margin-left: 20px;">
      <span class="navbar-toggler-icon">
      </span>
    </button>
    <!--logo-->
    <a href="{% url 'Home' %}" class="navbar-brand"> 
      <img src="{% static 'img/LOGO REDONDO PNG.png' %}" alt="" width="60px" height="60px" style="margin-left: 20px;">
    </a>
    <div class="golden">
      <img class="img-fluid" src="{% static 'img/golden 90.png' %}  " alt="oro">
    </div>
      <div class="collapse navbar-collapse" id="opciones">
       
        <!-- Links -->
        <ul class="navbar-nav" style="margin-left:20px" >
          <li class="nav-item">
            <a class="nav-link" style="color: rgb(190, 0, 175); font-family:cursive" href="{% url 'Servicio' %}" target="_blank">Servicio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" style="color: rgb(190, 0, 175); font-family: cursive;" href="{% url 'Aspectos' %}" target="_blank">Galeria</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" style="color: rgb(190, 0, 175); font-family: cursive;" href="{% url 'Disponibilidad' %}" target="_blank">Disponibilidad feriados</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" style="color: rgb(190, 0, 175); font-family: cursive;" href="{% url 'Valores' %}" target="_blank">Valores</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" style="color: rgb(190, 0, 175); font-family: cursive;" href="{% url 'Sugerencias' %}" target="_blank">Sugerencias</a>
          </li>
        </ul>
      </div>
  </nav>
    </head>

    <div class="container ">
        <hr>
        <h2>Sugerencias o reclamos</h2>
        <hr>
        <form id="mis-datos">

            <label for="nom">Nombre: </label>
            <input type="text" class="form-control" id="nom" name="nom" required minlength="3"
              placeholder="Ingrese su nombre..">

            <label for="correo">Correo?: </label>
            <input type="email" class="form-control" id="correo" name="correo" required 
                placeholder="Ingrese su correo..">

            <label for="telefono">Telefono: </label>
            <input type="text" class="form-control" id="telefono" name="telefono" required minlength="9"
                  placeholder="Ingrese su teléfono..">

            <label for="fecha">Seleccione fecha del evento: </label>
            <input type="date" id="fecha" name="fecha" required min="1940-01-01" class="form-control">

            <h2>Ingresa tu sugerencia o reclamo</h2>

            <textarea id=""  rows="4" cols="100"></textarea>

            <a class="fcc-btn" href="{% url 'Home' %}">Enviar</a> 

        </form>
    </div>
    
    <script src="{% static 'https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js' %}"></script>
    <script src="{% static 'https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.js' %}"></script>
    <script src="{% static 'js/validaFormulario.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


    <footer class="bg-footer-green text-dark pt-5 pb-4">
      <div class="container text-center text-md-start">
          <div class="row justify-content-center justify-content-md-start">      
              <div class="col-md-2 col-lg-2 col-xl-2 mx-auto mt-3, logofoot ">
                <div class="contenedorfoot">
                  <img class="img-fluid" class="footlogo" src="{% static 'img/LOGO REDONDO PNG.png' %}">
                </div>
              </div>
          </div>
          <hr class="mb-4">
          <div class="footer-centrado mb-2">
            <p>
                @Copyright 2024 Todos los derechos reservados
                <a href="#">
                    Fiesta Helados🍦
                </a>
            </p>
        </div>
        <div class="footer-centrado">
            <ul class="list-unstyled list-inline">
                <li class="list-inline-item">
                  <a href="https://www.instagram.com/fiestahelados/" target="_blank">
                    <img src="{%  static 'img/Instagram-Icon.png' %}" height="60px" width="60px" >

                </li>
                <li class="list-inline-item">

                    <img src="{% static 'img/Facebook_logo.png' %}" height="60px" width="60px">
                  </a> 
                </li>
            </ul>
        </div> 
      </div>
