<!DOCTYPE html>
<html lang="en">
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fiesta Helados</title>
        {% load static %}
        <link rel="icon" type="image/jpg" href="{% static 'img/LOGO REDONDO PNG.png' %}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{% static 'css/MisEstilos.css' %}">
    </head>
<body>
    <nav class="navbar navbar-expand-sm bg-light, menu">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#opciones"
            style="margin-left: 20px;">
          <span class="navbar-toggler-icon">
          </span>
        </button>
        <!--logo-->
        <a href="{% url 'Home' %}" class="navbar-brand"> 
          <img src="{% static 'img/LOGO REDONDO PNG.png' %}" alt="" width="60px" height="60px" style="margin-left: 20px;">
        </a>
        <div class="golden">
          <img class="img-fluid" src="{% static 'img/golden 90.png' %}  " alt="oro">
        </div>
          <div class="collapse navbar-collapse" id="opciones">
           
            <!-- Links -->
            <ul class="navbar-nav" style="margin-left:20px" >
              
                    <li class="nav-item">
                      <a class="nav-link" style="color: rgb(190, 0, 175); font-family:cursive" href="{% url 'Servicio' %}" target="_blank">Servicio</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" style="color: rgb(190, 0, 175); font-family:cursive" href="{% url 'Productos' %}" target="_blank">Productos</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link"  style="color: rgb(190, 0, 175); font-family:cursive" href="{% url 'tienda' %}">Tienda</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" style="color: rgb(190, 0, 175); font-family: cursive;" href="{% url 'Aspectos' %}" target="_blank">Galeria</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" style="color: rgb(190, 0, 175); font-family: cursive;" href="{% url 'Disponibilidad' %}" target="_blank">Disponibilidad feriados</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" style="color: rgb(190, 0, 175); font-family: cursive;" href="{% url 'Valores' %}" target="_blank">Valores</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" style="color: rgb(190, 0, 175); font-family: cursive;" href="{% url 'Sugerencias' %}" target="_blank">Sugerencias</a>
                    </li>
            </ul>
          </div>
      </nav>
      <main class="container" style="margin-top: 115px;">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card" style="color: #426e9b;">
                    <h2 class="form__tittle" style="margin-top: 40px;">PERFIL DE USUARIO</h2>
                    <img src="{% static 'img/perfil.png' %} " class="card-img-top" style="height: 510px;">
                    <div class="card-body" style="text-align: center;">
                        <h5 class="card-title">USUARIO: {{user.username}}</h5>
                        <p class="card-text">Nombre: {{ user.first_name }}</p>
                        <p class="card-text">Apellido: {{ user.last_name }}</p>
                        <p class="card-text">Correo: {{ user.email }}</p>         
                        <a href="{% url 'perfilmod' user.username %}" class="btn btn-primary">Modificar Información</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
